<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <title>Gestionar Canchas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #1e1e1e;
            color: white;
        }
        .bg-light {
            background-color: #f8f9fa !important;
        }
    </style>
</head>
<body class="container text-center mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">GESTION DE CANCHAS</h2>
    <button class="btn btn-success mb-3" onclick="abrirModalCrear()">
    + Crear Cancha
</button>
</div>

<table class="table table-hover shadow rounded overflow-hidden">
    <thead style="background-color: #0d6efd; color: white;">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Tipo</th>
        <th>Gestión</th>
    </tr>
    </thead>
    <tbody class="bg-light" id="tablaCanchas">
    </tbody>
</table>

<button class="btn btn-primary btn-lg mb-5"
        onclick="window.location.href='/admin'">
    DASHBOARD
</button>

<!-- Modal -->
<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content text-white">
            <div class="modal-header">
                <h5 class="modal-title">Editar Cancha</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label for="editNombre" class="form-label">Nombre</label>
                    <input type="text" id="editNombre" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="editTipo" class="form-label">Tipo</label>
                    <input type="text" id="editTipo" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarCambios()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/canchas.js"></script>
</body>
</html>
