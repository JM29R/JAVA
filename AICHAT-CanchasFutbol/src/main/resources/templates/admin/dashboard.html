<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #1e1e1e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard-card {
            background-color: #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
        }
    </style>
</head>

<body>

<div class="dashboard-card shadow-lg text-center">

    <h2 class="mb-4">Panel Admin</h2>

    <div class="d-grid gap-3">

        <button class="btn btn-primary btn-lg"
                onclick="window.location.href='/admin/reservas'">
            Administrar Reservas
        </button>

        <button class="btn btn-primary btn-lg"
                onclick="window.location.href='/admin/canchas'">
            Administrar Canchas
        </button>

        <button class="btn btn-primary btn-lg"
                onclick="window.location.href='/admin/mensajes'">
            Administrar Mensajes
        </button>

        <button class="btn btn-danger btn-lg mt-3"
                onclick="logout()">
            Cerrar sesión
        </button>

    </div>

</div>

<script>

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/login";
    }

    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login";
    }

</script>

</body>
</html>
