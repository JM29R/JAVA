<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Mensajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4 text-center">GESTIÓN DE MENSAJES</h2>

<!-- FILTROS Y ACCIONES -->
<div class="d-flex justify-content-between align-items-end mb-3 flex-wrap gap-2">

    <div class="d-flex gap-2">
        <input type="text" id="filtroTelefono" class="form-control" placeholder="Filtrar por teléfono">

        <input type="text" id="filtroIntencion" class="form-control" placeholder="Filtrar por intención">

        <button class="btn btn-primary" onclick="filtrar()">Filtrar</button>
        <button class="btn btn-secondary" onclick="cargarMensajes()">Reset</button>
    </div>

    <div class="d-flex gap-2">
        <button class="btn btn-danger" onclick="eliminarPorTelefono()">Eliminar por Teléfono</button>
        <button class="btn btn-danger" onclick="eliminarTodos()">Eliminar Todos</button>
    </div>

</div>

<table class="table table-dark table-hover shadow rounded overflow-hidden">
    <thead>
    <tr>
        <th>ID</th>
        <th>Teléfono</th>
        <th>Mensaje Usuario</th>
        <th>Respuesta Sistema</th>
        <th>Intención</th>
        <th>Fecha y Hora</th>
        <th>Gestión</th>
    </tr>
    </thead>
    <tbody id="tablaMensajes">
    </tbody>
</table>

<div class="text-center mt-4">
    <button class="btn btn-primary btn-lg"
            onclick="window.location.href='/admin'">
        DASHBOARD
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/mensajes.js"></script>

</body>
</html>
