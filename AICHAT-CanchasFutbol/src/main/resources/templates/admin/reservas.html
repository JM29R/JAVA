<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4 text-center">GESTIÓN DE RESERVAS</h2>
<div class="d-flex justify-content-between mb-3">
    <button class="btn btn-danger" onclick="EliminarTodas()">- Eliminar Todas</button>

    <button class="btn btn-success" onclick="abrirModalCrear()">+ Crear Reserva</button>
</div>
<table class="table table-dark table-hover shadow rounded overflow-hidden">
    <thead>
    <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Cliente</th>
        <th>Numero</th>
        <th>Cancha</th>
        <th>Gestion</th>
    </tr>
    </thead>
    <tbody id="tablaReservas">
    </tbody>
</table>

<!-- MODAL -->
<div class="modal fade" id="reservaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Reserva</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="editId">

                <div class="mb-3">
                    <label>Fecha</label>
                    <input type="date" class="form-control" id="editFecha">
                </div>

                <div class="mb-3">
                    <label>Hora</label>
                    <input type="time" class="form-control" id="editHora">
                </div>

                <div class="mb-3">
                    <label>Cancha</label>
                    <select class="form-select" id="editCancha"></select>
                </div>

                <div class="mb-3">
                    <label>Cliente</label>
                    <input type="text" class="form-control" id="editNombre">
                </div>

                <div class="mb-3">
                    <label>Telefono</label>
                    <input type="text" class="form-control" id="editTelefono">
                </div>



            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="guardarCambios()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<div class="text-center mt-4">
    <button class="btn btn-primary btn-lg"
            onclick="window.location.href='/admin'">
        DASHBOARD
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/reservas.js"></script>

</body>
</html>
