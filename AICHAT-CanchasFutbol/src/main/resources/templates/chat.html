<!DOCTYPE html>
<html lang="es" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chat Reservas</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
        background-color: #1e1e1e;
        color: #ffffff;
    }

    .card {
        background-color: #2a2a2a;
        border: none;
        border-radius: 16px;
    }

    .chat-box {
        height: 400px;
        overflow-y: auto;
        background-color: #2a2a2a;
        border-radius: 16px;
        padding: 15px;
        border: 1px solid #3a3a3a;
    }

    .mensaje-user {
        text-align: right;
        margin-bottom: 10px;
    }

    .mensaje-bot {
        text-align: left;
        margin-bottom: 10px;
    }

    .bubble-user {
        display: inline-block;
        background-color: #0d6efd;
        color: white;
        padding: 10px 14px;
        border-radius: 18px;
    }

    .bubble-bot {
        display: inline-block;
        background-color: #3a3a3a;
        color: white;
        padding: 10px 14px;
        border-radius: 18px;
    }

    input.form-control {
        background-color: #2a2a2a;
        color: white;
        border: 1px solid #3a3a3a;
    }

    input.form-control:focus {
        background-color: #2a2a2a;
        color: white;
        border-color: #0d6efd;
        box-shadow: none;
    }

    label {
        color: #cccccc;
    }

    </style>

    <!-- 🔴 CONFIGURACIÓN CRÍTICA: Se ejecuta ANTES que cualquier script -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        (function() {
            // Obtener la URL base del servidor usando Thymeleaf
            var requestURL = /*[[${#request.getRequestURL()}]]*/ '';
            var requestURI = /*[[${#request.getRequestURI()}]]*/ '';
            var baseUrl = requestURL.replace(requestURI, '');

            // Guardar en window para que esté disponible globalmente
            window.BASE_URL = baseUrl;

            console.log('🔧 Configuración Thymeleaf - BASE_URL:', window.BASE_URL);
            console.log('📊 Debug:', {
                requestURL: requestURL,
                requestURI: requestURI,
                baseUrl: baseUrl,
                origin: window.location.origin
            });
        })();
        /*]]>*/
    </script>
</head>

<body class="container mt-5">

<h2 class="mb-4 text-center">CHATBOT DE TURNOS</h2>

<!-- FORMULARIO INICIAL -->
<div id="formularioInicial" class="card p-4 mb-4">
    <div class="mb-3">
        <label>Nombre (FAKE)</label>
        <input type="text"
               id="nombre"
               class="form-control"
               required
               oninput="this.value = this.value.replace(/[^a-zA-ZÁÉÍÓÚáéíóúñÑ ]/g, '')">
    </div>

    <div class="mb-3">
        <label>Teléfono (FAKE)</label>
        <input type="text"
               id="telefono"
               class="form-control"
               required
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    </div>
    <button class="btn btn-success w-100 " onclick="iniciarChat()"> Comenzar Chat </button>
</div>

<!-- CHAT -->
<div id="chatContainer" style="display:none;">
    <div class="chat-box mb-3" id="chatBox"></div>
    <div class="input-group">
        <input type="text" id="mensaje" class="form-control" placeholder="Escribí tu mensaje...">
        <button class="btn btn-primary " onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<button class="btn btn-success w-100 mt-3" onclick="paneladmin()">
    Login ADMIN
</button>

<!-- 🔴 IMPORTANTE: Agregamos un timestamp para evitar caché -->
<script th:src="@{/js/chat.js(v=${#dates.createNow().time})}"></script>

</body>
</html>
