spring.application.name=HexagonalForum

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/Hexagonal_forum?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.main.allow-circular-references=true

jwt.secret=MiPasswordUltraSegura123!@#QueCumpleConLaLongitud
jwt.expiration=86400000
