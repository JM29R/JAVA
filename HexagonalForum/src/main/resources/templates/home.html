<!DOCTYPE html>
<html lang="es" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Tópicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">

    <style>
        .card-custom {
            background-color: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .card-custom:hover {
            transform: translateY(-5px);
            background-color: #333;
        }

        .error-text {
            color: #dc3545;
            text-align: center;
        }
    </style>
</head>
<body>
<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid px-4">
        <!-- Logo / Brand -->
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-chat-dots-fill me-2"></i>
            HexagonalForum
        </a>

        <!-- Botón toggle para mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarActions"
                aria-controls="navbarActions" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Acciones del navbar -->
        <div class="collapse navbar-collapse" id="navbarActions">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item">
                    <button class="btn btn-outline-light" th:onclick="crearTopico()">
                        <i class="bi bi-plus-circle me-1"></i>
                        Crear Tópico
                    </button>
                </li>
                <li class="nav-item">
                    <button class="btn btn-danger" th:onclick="logout()">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Salir
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

</nav>

<!-- 📦 Contenido -->
<div class="container mt-4">

    <h2 class="mb-4">Tópicos</h2>

    <div id="topicos-container" class="row g-3"></div>

    <p id="error" class="error-text mt-3"></p>

</div>

<script th:src="@{/js/home.js}" src="/js/home.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
