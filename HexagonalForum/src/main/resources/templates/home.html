<!DOCTYPE html>
<html lang="es" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Tópicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">

    <style>
        .card-custom {
            background-color: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .card-custom:hover {
            transform: translateY(-5px);
            background-color: #333;
        }

        .error-text {
            color: #dc3545;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">HexagonalForum</span>
    <button class="btn btn-danger" th:onclick="logout()">Salir</button>
</nav>

<!-- 📦 Contenido -->
<div class="container mt-4">

    <h2 class="mb-4">Tópicos</h2>

    <div id="topicos-container" class="row g-3"></div>

    <p id="error" class="error-text mt-3"></p>

</div>

<script th:src="@{/js/home.js}" src="/js/home.js"></script>

</body>
</html>
