<!DOCTYPE html>
<html lang="es" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">

    <style>
        body {
            background-color: #1e1e1e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard-card {
            background-color: #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
        }

        .btn-red {
            background-color: #dc3545;
            border: none;
            color: white;
        }

        .btn-red:hover {
            background-color: #bb2d3b;
        }
    </style>
</head>
<body>

<div class="dashboard-card shadow-lg text-center">

    <h2 class="mb-4">Create Account</h2>

    <div class="mb-3 text-start">
        <label class="form-label">Username</label>
        <input type="text" id="user" class="form-control">
    </div>

    <div class="mb-3 text-start">
        <label class="form-label">Password</label>
        <input type="password" id="pass" class="form-control">
    </div>

    <button class="btn btn-red w-100 mt-2" th:onclick="register()">
        Create
    </button>

    <button class="btn btn-red w-100 mt-2" th:onclick="|window.location.href='@{/view/login}'|">
        Login
    </button>

    <p id="error" class="text-danger mt-3"></p>

</div>

<script th:src="@{/js/register.js}" src="/js/register.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            register();
        }
    });
    /*]]>*/
</script>

</body>
</html>
