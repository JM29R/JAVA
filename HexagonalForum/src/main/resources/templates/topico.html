<!DOCTYPE html>
<html lang="es" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Tópico</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .card-custom {
            background-color: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        hr {
            border-color: #444;
        }

        .respuesta-item {
            background-color: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
            position: relative;
        }

        .respuesta-item:hover {
            background-color: #333;
        }

        .respuesta-contenido {
            flex: 1;
            padding-right: 80px;
        }

        .respuesta-acciones {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .btn-accion {
            background: none;
            border: none;
            margin-left: 8px;
            transition: all 0.2s;
        }

        .btn-accion:hover {
            transform: scale(1.1);
        }

        .btn-editar {
            color: #ffc107;
        }

        .btn-editar:hover {
            color: #ffca2c;
        }

        .btn-eliminar {
            color: #dc3545;
        }

        .btn-eliminar:hover {
            color: #ff6b6b;
        }

        .modal-content {
            background-color: #2a2a2a;
        }

        textarea {
            background-color: #333;
            color: white;
            border: 1px solid #444;
        }

        textarea:focus {
            background-color: #3a3a3a;
            color: white;
        }

        .modal-header .btn-close {
            background-color: white;
        }

        #botones-topico {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <!-- 🔙 Volver -->
    <button class="btn btn-secondary mb-3" onclick="history.back()">
        ← Volver
    </button>

    <!-- 📌 Tópico -->
    <div class="card-custom shadow p-4 mb-4" style="position: relative;">
        <div id="botones-topico" style="display: none;">
            <button class="btn-accion btn-editar" onclick="abrirModalEditarTopico()" title="Editar tópico">
                <i class="fas fa-edit fa-lg"></i>
            </button>
            <button class="btn-accion btn-eliminar" onclick="eliminarTopico()" title="Eliminar tópico">
                <i class="fas fa-trash fa-lg"></i>
            </button>
        </div>
        <h2 id="titulo"></h2>
        <p id="mensaje"></p>
        <small id="autor"></small>
    </div>

    <hr>

    <!-- 💬 Respuestas -->
    <h4>Respuestas <span id="contador-respuestas" class="badge bg-secondary"></span></h4>
    <div id="respuestas-container" class="mt-3"></div>

    <hr>

    <!-- ✍️ Crear respuesta -->
    <h5>Agregar respuesta</h5>

    <textarea
            id="nuevaRespuesta"
            class="form-control mb-2"
            placeholder="Escribí tu respuesta..."
            rows="3"
    ></textarea>

    <button class="btn btn-primary" onclick="crearRespuesta()">
        <i class="fas fa-reply"></i> Responder
    </button>

    <!-- ❗ Mensajes -->
    <div id="mensaje-container" class="mt-3"></div>

</div>

<!-- Modal Editar Tópico -->
<div class="modal fade" id="modalEditarTopico" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Tópico</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="editTopicoTitulo" class="form-control mb-2" placeholder="Título">
                <textarea id="editTopicoMensaje" class="form-control" rows="4" placeholder="Mensaje"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarEdicionTopico()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Editar Respuesta -->
<div class="modal fade" id="modalEditarRespuesta" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Respuesta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea id="editRespuestaMensaje" class="form-control" rows="4" placeholder="Mensaje"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarEdicionRespuesta()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/topico.js}" src="/js/topico.js"></script>

</body>
</html>
