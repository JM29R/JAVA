<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Tópico</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container mt-4">

    <!-- 🔙 Volver -->
    <button class="btn btn-secondary mb-3" onclick="history.back()">
        ← Volver
    </button>

    <!-- 📌 Tópico -->
    <div class="card-custom shadow p-4 mb-4">
        <h2 id="titulo"></h2>
        <p id="mensaje"></p>
        <small id="autor"></small>
    </div>

    <hr>

    <!-- 💬 Respuestas -->
    <h4>Respuestas</h4>
    <div id="respuestas" class="mt-3"></div>

    <hr>

    <!-- ✍️ Crear respuesta -->
    <h5>Agregar respuesta</h5>

    <textarea
            id="nuevaRespuesta"
            class="form-control mb-2"
            placeholder="Escribí tu respuesta..."
    ></textarea>

    <button class="btn btn-primary" onclick="crearRespuesta()">
        Responder
    </button>

    <!-- ❗ Error -->
    <p id="error" class="text-danger mt-3"></p>

</div>

<script src="/js/topico.js"></script>

</body>
</html>
